openapi: 3.0.3
info:
  title: Standard E-Commerce Backend API
  version: 1.1.0
  description: OpenAPI for all currently exposed /api/v1 endpoints.
servers:
  - url: /api/v1
    description: Base API v1 path

tags:
  - name: Auth
  - name: Customer
  - name: Product
  - name: Category
  - name: Cart
  - name: Order
  - name: Payment
  - name: Admin Category
  - name: Admin Product
  - name: Admin Order
  - name: Admin Customer
  - name: Admin Report
  - name: Admin Audit Log
  - name: Upload
  - name: Webhook

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiError:
      type: object
      nullable: true
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        details:
          type: array
          items:
            type: string

    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: OK
        data:
          nullable: true
        error:
          $ref: '#/components/schemas/ApiError'
      required: [success, message, data, error]

    RegisterCustomerRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        full_name: { type: string }
        phone: { type: string }
      required: [email, password, full_name]

    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
      required: [email, password]

    UpsertCategoryRequest:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
      required: [name, slug]

    UpsertProductRequest:
      type: object
      properties:
        category_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        sku: { type: string }
        description: { type: string }
        price: { type: integer, format: int64, example: 100000 }
        stock: { type: integer, minimum: 0 }
        image_url: { type: string, format: uri }
      required: [category_id, name, slug, sku, price, stock]

    AddCartItemRequest:
      type: object
      properties:
        product_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
      required: [product_id, quantity]

    UpdateCartItemRequest:
      type: object
      properties:
        quantity: { type: integer, minimum: 1 }
      required: [quantity]

    CheckoutRequest:
      type: object
      properties:
        address_id: { type: string, format: uuid }
      required: [address_id]

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING_PAYMENT, PAID, PROCESSING, READY_TO_SHIP, SHIPPED, COMPLETED, CANCELLED, EXPIRED, FAILED]
      required: [status]

    UpdateStockRequest:
      type: object
      properties:
        stock: { type: integer, minimum: 0 }
      required: [stock]

    AddressRequest:
      type: object
      properties:
        label: { type: string }
        recipient_name: { type: string }
        phone: { type: string }
        line1: { type: string }
        line2: { type: string }
        city: { type: string }
        state: { type: string }
        postal_code: { type: string }
        country: { type: string }
        is_default: { type: boolean }
      required: [recipient_name, phone, line1, city, state, postal_code, country]

paths:
  /auth/customer/register:
    post:
      tags: [Auth]
      summary: Register customer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterCustomerRequest' }
      responses:
        '201': { description: Created }

  /auth/customer/login:
    post:
      tags: [Auth]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: OK }

  /auth/admin/login:
    post:
      tags: [Auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: OK }

  /auth/me:
    get:
      tags: [Auth]
      summary: Authenticated user info
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /categories:
    get:
      tags: [Category]
      summary: Public category list
      responses:
        '200': { description: OK }

  /products:
    get:
      tags: [Product]
      summary: Public product list
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1 }
      responses:
        '200': { description: OK }

  /products/{slug}:
    get:
      tags: [Product]
      summary: Public product detail by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }

  /customers/me:
    get:
      tags: [Customer]
      summary: Customer profile
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    put:
      tags: [Customer]
      summary: Update customer profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: OK }

  /customers/me/addresses:
    get:
      tags: [Customer]
      summary: Customer addresses
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      tags: [Customer]
      summary: Create address
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressRequest' }
      responses:
        '201': { description: Created }

  /customers/me/addresses/{id}:
    put:
      tags: [Customer]
      summary: Update address
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressRequest' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Customer]
      summary: Delete address
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /customers/me/orders:
    get:
      tags: [Customer]
      summary: Customer order history
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /customers/me/orders/{id}:
    get:
      tags: [Customer]
      summary: Customer order detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /cart:
    get:
      tags: [Cart]
      summary: Get active cart
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    delete:
      tags: [Cart]
      summary: Clear active cart
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddCartItemRequest' }
      responses:
        '200': { description: OK }

  /cart/items/{id}:
    put:
      tags: [Cart]
      summary: Update cart item quantity
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCartItemRequest' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Cart]
      summary: Remove cart item
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /orders/checkout:
    post:
      tags: [Order]
      summary: Checkout active cart
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckoutRequest' }
      responses:
        '201': { description: Created }

  /orders:
    get:
      tags: [Order]
      summary: Customer order list
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /orders/{id}:
    get:
      tags: [Order]
      summary: Customer order detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /payments/orders/{order_id}/pay:
    post:
      tags: [Payment]
      summary: Create payment for an order
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: order_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201': { description: Created }

  /payments/{id}/status:
    get:
      tags: [Payment]
      summary: Get payment status
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /webhooks/payments/midtrans:
    post:
      tags: [Webhook]
      summary: Midtrans payment webhook
      responses:
        '200': { description: OK }

  /webhooks/payments/xendit:
    post:
      tags: [Webhook]
      summary: Xendit payment webhook
      responses:
        '200': { description: OK }

  /admin/customers:
    get:
      tags: [Admin Customer]
      summary: List customers
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /admin/customers/{id}:
    get:
      tags: [Admin Customer]
      summary: Customer detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /admin/customers/{id}/orders:
    get:
      tags: [Admin Customer]
      summary: Customer orders
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /admin/categories:
    post:
      tags: [Admin Category]
      summary: Create category
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertCategoryRequest' }
      responses:
        '201': { description: Created }

  /admin/categories/{id}:
    put:
      tags: [Admin Category]
      summary: Update category
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertCategoryRequest' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Admin Category]
      summary: Delete category
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /admin/products:
    post:
      tags: [Admin Product]
      summary: Create product
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertProductRequest' }
      responses:
        '201': { description: Created }

  /admin/products/{id}:
    put:
      tags: [Admin Product]
      summary: Update product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertProductRequest' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Admin Product]
      summary: Delete product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /admin/products/{id}/publish:
    patch:
      tags: [Admin Product]
      summary: Publish product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /admin/products/{id}/unpublish:
    patch:
      tags: [Admin Product]
      summary: Unpublish product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /admin/products/{id}/stock:
    put:
      tags: [Admin Product]
      summary: Update product stock
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateStockRequest' }
      responses:
        '200': { description: OK }

  /admin/orders:
    get:
      tags: [Admin Order]
      summary: List orders
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /admin/orders/{id}:
    get:
      tags: [Admin Order]
      summary: Order detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /admin/orders/{id}/status:
    patch:
      tags: [Admin Order]
      summary: Update order status
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOrderStatusRequest' }
      responses:
        '200': { description: OK }

  /admin/reports/orders:
    get:
      tags: [Admin Report]
      summary: Orders report
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
      responses:
        '200': { description: OK }

  /admin/reports/sales:
    get:
      tags: [Admin Report]
      summary: Sales report
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /admin/reports/products:
    get:
      tags: [Admin Report]
      summary: Product report
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /admin/reports/payments:
    get:
      tags: [Admin Report]
      summary: Payment report
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /admin/audit-logs:
    get:
      tags: [Admin Audit Log]
      summary: Audit log list
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /admin/uploads/images:
    post:
      tags: [Upload]
      summary: Upload image placeholder
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
